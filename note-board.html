<html>
    

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New NoteBoard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>


<body>
    <div class="wrapper">

        <h1 class="title">StickyNotes.io😎📝</h1>

        <button id="addNote" class="add-note-btn"><i class="fa-solid fa-plus"></i></button>
        <div class="note-form" id="noteFormWrapper">
            <form id="form">
                <button id="closeBtn"><i class="fa-solid fa-xmark"></i></button>
                <label>Title</label>
                <div>
                <input type="text" name="Title" placeholder="Add Title" maxlength="20" id="title">
                <input type="color" name = 'Title-color' value="#ffffff" id="colorEl">
                </div>

                <label>Note</label>
                <div>
                <textarea name="Note" placeholder="Write Anything" maxlength="50" id="note"></textarea>
                <input type="color" name = 'Content-color' value="#ffffff" id="colorEl">
                </div>
                <label>Select Note Color</label>
                <select name="Note-color">
                    <option value="#a3ce45">Green 🟢</option>
                    <option value="#e8633e">Red 🔴</option>
                    <option value="#fdea59">Yellow 🟡</option>
                    <option value="wheat">Wheat 🌝</option>
                    <option value="#65c4ed">Blue 🔵</option>
                    <option value="#fc7e2b">Orange 🟠</option>
                </select>
                <button id="submitBtn">Create</button>
            </form>


        </div>
        <div class="note-board" id="noteBoard"></div>
    </div>

    <audio src="./sound-effects/Add.mp3" id="addSound"></audio>
    <audio src="./sound-effects/Complete-Delete.mp3" id="completeSound"></audio>
    <script src="js/script.js"></script>
</body>

</html>
