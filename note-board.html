<html>

<head>
    <title>New NoteBoard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>


<body>
    <div class="wrapper">

        <button id="addNote" class="add-note-btn"><i class="fa-solid fa-plus"></i></button>
        <div class="note-form" id="noteFormWrapper">
            <form id="form">
                <label>Title</label>
                <input type="text" name="Title" placeholder="Add Title">

                <label>Note</label>
                <textarea name="Note" placeholder="Write Anything"></textarea>

                <button id="submitBtn">Create</button>
            </form>


        </div>
        <div class="note-board" id="noteBoard"></div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
